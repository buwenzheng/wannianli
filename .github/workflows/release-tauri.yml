# 本地 IDE 的 GitHub Actions 插件可能因无法访问 GitHub 解析 action 而报 "repository or version not found"，
# 属误报；实际在 GitHub 上运行正常。修改 workflow 前建议本地先执行 npm run tauri:build 验证打包成功。
name: "Release Wannianli"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## 万年历 ${{ github.ref_name }}

            轻量级桌面万年历，专注「查看日期 + 农历 + 节假日」场景。

            ### ✨ 主要功能
            - 月视图日历：支持快速切换月份 / 年份，今日高亮、选中态、跨月灰显
            - 农历与节气：1900–2100 年农历换算，干支纪年、生肖、24 节气
            - 节假日展示：
              - 法定节假日高亮
              - 调休补班日右上角“班”、法定假日/假期周末右上角“休”
              - 底部显示「距离下一个节假日还有 X 天」
            - 托盘集成：
              - 托盘图标显示当日日期数字
              - 点击托盘唤出/隐藏日历窗口
              - 右键菜单：显示/隐藏、回到今天、打开设置、关于、退出
            - 设置面板：
              - 是否显示农历 / 节日 / 节气
              - 今日高亮开关
              - 窗口透明度与毛玻璃效果开关

            ### 🖥️ 平台支持
            - Windows 10/11：NSIS 安装包（`*.exe`）
            - macOS 12+：DMG 安装包（`*.dmg`）

            ### 📝 已知限制
            - 仅支持中文界面（简体）；
            - 调休数据依赖公开假期数据源，极端情况下网络失败会降级为「只标记周末」；
            - 未来版本将考虑：深色主题、快捷搜索、日期详情面板等增强功能。
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI (JS wrapper)
        run: npm install @tauri-apps/cli@^2 --save-dev

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload Windows installer
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*.exe
          overwrite_files: true

      - name: Upload macOS installer (DMG)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/dmg/*.dmg
          overwrite_files: true

      - name: Upload macOS updater bundle (tar.gz)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/macos/*.app.tar.gz
          overwrite_files: true

      - name: Generate latest.json (Windows)
        if: matrix.platform == 'windows-latest'
        run: node scripts/generate-latest-json.mjs windows x86_64
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload Windows latest.json
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/latest-windows-x86_64.json
          overwrite_files: true

      - name: Generate latest.json (macOS)
        if: matrix.platform == 'macos-latest'
        run: node scripts/generate-latest-json.mjs darwin aarch64
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload macOS latest.json
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/latest-darwin-aarch64.json
          overwrite_files: true
